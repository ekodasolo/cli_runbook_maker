scenario:
  id: "0100"
  title: "Training用VPCの作成"
  description: |
    基本的なVPC構成によるネットワークを構築する。
    本シナリオでは、VPCを作成する。

  resources:
    - name: "project-dev-main-vpc"
      description: "VPC"
      note: "構築するVPC"

  who:
    - Unixシェルの基本操作ができること
    - TCP/IPの基本的な内容を理解しアドレス割り当てやIPルーティングが設定できること
    - AWS CLIの基本操作ができること
    - EC2/VPCへのアクセス権があること

  where: |
    CloudShellに接続し、CloudShell上で作業することを前提とする。
    必要な権限をもったIAM User/IAM RoleでCloudShellを立ち上げる。

  # シナリオ共通パラメータ（各手順書に注入される）
  params:
    region: ap-northeast-1
    vpc_cidr: "10.0.0.0/24"
    vpc_name: "project-dev-main-vpc"

  steps:
    - runbook: 0101-create-vpc
    - runbook: 0102-modify-dns-hostname
