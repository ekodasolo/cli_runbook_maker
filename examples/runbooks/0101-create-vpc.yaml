runbook:
  id: "0101"
  title: "VPCを作成する"
  about: |
    VPCを作成するCLI手順書。

    本手順では、VPCを東京リージョンに作成する。
  services:
    - EC2/VPC
  duration: "5 Min"
  operation: CREATE

  before:
    - 作業リージョンでVPCの作成数上限に達しておらずVPCが作成可能である。
    - 割り当てたIPアドレス範囲が他の既存のVPCと重複しておらず、作成可能である。
  after:
    - VPCが作成されている。
    - 作成したVPCは東京リージョンに配置されている。

  template: runbook

  # 1.2, 1.3, ... の事前確認
  pre_checks:
    - title: "VPC作成数の上限の確認"
      description: |
        リージョン内に作成できるVPCの数は、特に上限緩和していなければ、リージョンあたり5個まで。現状で5個に達していないかを事前に確認する。
      snippet: snippets/ec2/list-vpcs.md
    - title: "依存リソースの確認"
      description: |
        依存するリソースが存在していることを確認。本作業では依存リソースは無い。

  # 2.1 主処理
  main:
    snippet: snippets/ec2/create-vpc.md

  # 3.1 事後確認
  post_checks:
    - snippet: snippets/ec2/describe-vpcs.md

  # 共通パラメータファイル（runbook YAML からの相対パス）
  params_files:
    - ../params/training-common.yaml

  params: {}

  navigation:
    next:
      title: "VPC属性を設定する"
      link: "./0102-modify-dns-hostname.md"
