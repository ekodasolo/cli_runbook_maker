runbook:
  id: "0102"
  title: "VPC属性を設定する"
  about: |
    VPC属性を変更するCLI手順書。

    本手順では、VPCの属性値を変更し、DNS Hostnameを有効にする。
  services:
    - EC2/VPC
  duration: "5 Min"
  operation: MODIFY

  before:
    - VPCが作成済みである。
    - VPCの属性値DNS hostnameがDisabledになっている。
  after:
    - VPCのDNS hostnamesが、Enabledになっている。

  template: runbook

  pre_checks:
    - title: "VPCが作成済みであることの確認"
      description: |
        VPCが作成済みか、事前に確認する。作成済みの場合は VPC ID を取得しておく。
      snippet: snippets/ec2/find-vpc-id-by-cidr.md
    - title: "VPC属性 (DNS Hostname) の現状確認"
      description: |
        VPCのDNS関連属性の現状を確認する。DNS HostnameがDisabledであることを確認する。
      snippet: snippets/ec2/describe-vpc-dns-attributes.md

  main:
    snippet: snippets/ec2/modify-vpc-attribute.md

  post_checks:
    - title: "VPC属性の変更確認"
      description: |
        DNS Hostname 属性が Enabled に変わっていることを確認する（完了条件1に対応）。
      snippet: snippets/ec2/describe-vpc-attribute.md

  params_files:
    - ../params/training-common.yaml

  params:
    attribute: enableDnsHostnames
    cli_option: enable-dns-hostnames
    # value は JSON リテラル（"true"/"false"/"30" 等）と一致する文字列で書く。
    # YAML の bool/int をそのまま使うと Python の文字列化規則で
    # "True" のように大文字になり、コマンドの値と一致しなくなる。
    value: "true"

  navigation:
    next:
      title: "Subnetを作成する"
      link: "./0200-CreateSubnet-Scenario.md"
