runbook:
  id: "0303"
  title: "S3 バケットにデフォルト暗号化 (SSE-S3) を設定する"
  about: |
    S3 バケットのデフォルト暗号化を SSE-S3 (AES256) に設定する CLI 手順書。

    本手順では、バケットに保存されるオブジェクトのデフォルト暗号化方式を
    S3 マネージドキー (SSE-S3) に明示的に設定する。
  services:
    - S3
  duration: "3 Min"
  operation: MODIFY

  before:
    - バケット project-dev-training-bucket が作成済みであること。
  after:
    - バケットのデフォルト暗号化が SSE-S3 (AES256) に設定されていること。

  template: runbook

  pre_checks:
    - title: "対象バケットの存在確認"
      description: |
        操作対象のバケットが存在することを確認する。出力なしで正常終了すれば期待通り。
      snippet: snippets/s3/head-bucket.md
    - title: "現在の暗号化設定の確認"
      description: |
        デフォルト暗号化の現在の設定を確認する。
      snippet: snippets/s3/get-bucket-encryption.md

  main:
    snippet: snippets/s3/put-bucket-encryption-sse-s3.md

  post_checks:
    - title: "暗号化設定の確認"
      description: |
        SSEAlgorithm が AES256 になっていることを確認する。
      snippet: snippets/s3/get-bucket-encryption.md

  params_files:
    - ../params/training-s3.yaml

  params: {}

  navigation:
    next:
      title: "S3 バケットにデフォルト暗号化 (SSE-KMS) を設定する"
      link: "./0304-configure-s3-encryption-sse-kms.md"
